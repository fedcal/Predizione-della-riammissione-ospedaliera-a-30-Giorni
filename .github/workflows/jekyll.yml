# ============================================================================
#  Build & Deploy della documentazione Jekyll (Just the Docs) su GitHub Pages
# ============================================================================
#
#  Configurazione richiesta una volta sola dopo il primo push:
#    Settings → Pages → Build and deployment → Source = "GitHub Actions"
#
#  Trigger:
#    - push su main (tutti i file della cartella docs/)
#    - workflow_dispatch (run manuale dalla UI Actions)
# ============================================================================

name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '.github/workflows/jekyll.yml'
  workflow_dispatch:

# Permessi minimi necessari al deploy su Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola run alla volta, ma non interrompere quelle in corso
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash
    working-directory: docs

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 0
          working-directory: '${{ github.workspace }}/docs'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        # Override del baseurl con quello fornito da configure-pages
        # (gestisce automaticamente il path del repo: /repo-name)
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination ./_site
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
